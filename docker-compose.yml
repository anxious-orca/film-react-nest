version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/test:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
    - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/anxious-orca/film-backend:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: appdb
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
    command: sh -c "sleep 5 && node dist/main.js"
    ports:
      - "3000:3000"
    networks:
      - app

  frontend:
    image: ghcr.io/anxious-orca/film-frontend:latest
    volumes:
      - frontend_dist:/app/dist
    networks:
      - app

  nginx:
    image: ghcr.io/anxious-orca/film-nginx:latest
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html
    networks:
      - app

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app

networks:
  app:

volumes:
  pgdata:
  frontend_dist:
  pgadmin_data: